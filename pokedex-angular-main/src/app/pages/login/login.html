<main class="login">

  <section class="login__card">

    <img
      src="assets/logo.svg"
      alt="Pokédex"
      class="login__logo">

    <h1>Bem-vindo, Treinador!</h1>

    <p>Entre para acessar sua Pokédex.</p>

    <form
      [formGroup]="loginForm"
      (ngSubmit)="submitForm()">

      <label for="email">
        Email
      </label>

      <input
        id="email"
        type="email"
        placeholder="Digite seu email"
        formControlName="email">

      <label for="password">
        Senha
      </label>

      <input
        id="password"
        type="password"
        placeholder="Digite sua senha"
        formControlName="password">

      <button type="submit">
        Entrar
      </button>

      @if (msgError) {
        <p class="login__error">
            {{ msgError }}
        </p>
        }

    </form>
  </section>

</main>
